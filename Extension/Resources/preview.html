<!DOCTYPE html>
<!-- Browser dev harness for the renderer core. The extension itself runs
     render.js inside JavaScriptCore and serves static HTML to QuickLook;
     this page exists so the pipeline can be exercised in a browser. -->
<html>
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light dark">
<link rel="stylesheet" href="vendor/github-markdown.css">
<link rel="stylesheet" href="vendor/hljs-github.min.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="vendor/hljs-github-dark.min.css" media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="style.css">
<script src="vendor/markdown-it.min.js"></script>
<script src="vendor/markdown-it-footnote.min.js"></script>
<script src="vendor/markdown-it-task-lists.min.js"></script>
<script src="vendor/markdown-it-emoji.min.js"></script>
<script src="vendor/highlight.min.js"></script>
<script src="vendor/hljs-scala.min.js"></script>
<script src="vendor/hljs-dockerfile.min.js"></script>
<script src="vendor/hljs-powershell.min.js"></script>
<script src="vendor/hljs-protobuf.min.js"></script>
<script src="vendor/hljs-elixir.min.js"></script>
<script src="vendor/hljs-haskell.min.js"></script>
<script src="vendor/hljs-dart.min.js"></script>
<script src="vendor/hljs-groovy.min.js"></script>
<script src="vendor/hljs-clojure.min.js"></script>
<script src="vendor/hljs-erlang.min.js"></script>
<script src="vendor/hljs-julia.min.js"></script>
<script src="vendor/hljs-nginx.min.js"></script>
<script src="jira.js"></script>
<script src="render.js"></script>
<script>
  window.renderDocument = function (payload) {
    document.getElementById("content").innerHTML = window.renderDocumentHTML(payload);
    return true;
  };
</script>
</head>
<body>
<article id="content" class="markdown-body"></article>
</body>
</html>
